name: Update pinned Python runtime
on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine latest CPython minor (stable)
        id: latest_python
        run: |
          latest=$(curl -fsSL https://endoflife.date/api/python.json | jq -r '.[0].latest')
          if [ -z "$latest" ] || [ "$latest" = "null" ]; then
            latest=$(curl -fsSL https://endoflife.date/api/python.json | jq -r '.[0].version')
          fi
          echo "latest=$latest" >> "$GITHUB_OUTPUT"

      - name: Show detected latest
        run: echo "Latest Python: ${{ steps.latest_python.outputs.latest }}"

      - name: Update runtime files and create PR if changed
        env:
          LATEST_PY: ${{ steps.latest_python.outputs.latest }}
        run: |
          changed=0
          files=( "runtime.txt" ".python-version" )
          for f in "${files[@]}"; do
            if [ -f "$f" ]; then
              current=$(cat "$f" | tr -d '[:space:]')
              if [ "$current" != "$LATEST_PY" ]; then
                echo "$LATEST_PY" > "$f"
                git add "$f"
                changed=1
              fi
            fi
          done
          if [ $changed -eq 1 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: update Python runtime to $LATEST_PY" || true
          else
            echo "No runtime files changed"
            exit 0
          fi
      - name: Create PR
        if: success()
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: "chore: update Python runtime to ${{ steps.latest_python.outputs.latest }}"
          title: "chore: update Python runtime -> ${{ steps.latest_python.outputs.latest }}"
          body: "Automated update of runtime.txt / .python-version to ${{ steps.latest_python.outputs.latest }}."
          branch: "update/python-${{ steps.latest_python.outputs.latest }}"
          labels: "automation,dependencies"
