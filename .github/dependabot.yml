version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "github-releases"
    directory: "/"
    package-name: "Jamf-Concepts/jamf-cli"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 1
