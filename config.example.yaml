# jamf-reports community edition — example configuration
#
# Copy this file to config.yaml and edit to match your Jamf Pro instance.
# Run the scaffold command to auto-generate a starter config from your CSV:
#
#   python3 jamf-reports-community.py scaffold --csv your_export.csv
#
# The scaffold command reads your actual CSV headers and maps them to the
# logical field names below. You only need to hand-edit fields it could not
# detect automatically.
#
# Column names in this file must exactly match your Jamf Pro CSV headers,
# including capitalization and spaces.
#
# Validate your config against your CSV at any time:
#
#   python3 jamf-reports-community.py check --csv your_export.csv


# =============================================================================
# COLUMN MAPPING
# =============================================================================
# Maps logical field names (used internally by the report tool) to the actual
# column headers in your Jamf Pro CSV export.
#
# Required fields (marked below) must be present for core functionality.
# Optional fields can be omitted or left blank — those sheets or calculations
# will be skipped gracefully.
#
# Tip: Open your CSV in a spreadsheet app, copy the exact header text, and
# paste it here as the value.

columns:

  # --- Core identity fields (required) ---

  # The computer's display name in Jamf Pro.
  computer_name: "Computer Name"

  # The hardware serial number. Used as a stable unique key across reports.
  serial_number: "Serial Number"

  # The macOS version string as reported by Jamf inventory.
  # Common values: "macOS 15.3.2", "15.3.2", "Sequoia 15.3.2"
  # The tool normalises these automatically.
  operating_system: "Operating System Version"

  # Timestamp of the computer's last Jamf check-in.
  # Accepted formats: "YYYY-MM-DD", "YYYY-MM-DD HH:MM:SS", ISO 8601.
  last_checkin: "Last Check-in"

  # --- User assignment (optional) ---

  # The department the computer is assigned to.
  department: "Department"

  # The manager field (plain name or AD Distinguished Name — both are handled).
  # Do not point this at Jamf's built-in "Managed" / "Unmanaged" status column.
  manager: "Manager"

  # The assigned user's email address.
  email: "Email Address"

  # --- Security controls (optional — each drives a row in Security Controls sheet) ---

  # FileVault 2 encryption status. Prefer the detailed FileVault 2 status column
  # over summary/count-style columns such as "FileVault Status" with values like "1/1".
  filevault: "FileVault 2 - Status"

  # System Integrity Protection status. Typical values: "Enabled", "Disabled".
  sip: "System Integrity Protection"

  # macOS Firewall status. Typical values: "Enabled", "Disabled", "On", "Off".
  firewall: "Firewall Enabled"

  # Gatekeeper status. Typical values: "Enabled", "Disabled", "On", "Off".
  gatekeeper: "Gatekeeper"

  # Secure Boot level. Typical values: "Full Security", "Medium Security", "No Security".
  secure_boot: "Secure Boot Level"

  # Whether a Bootstrap Token is escrowed in Jamf. Prefer the escrowed column over
  # "Bootstrap Token Allowed" when tracking compliance.
  bootstrap_token: "Bootstrap Token Escrowed"

  # Boot volume percentage used. The tool reads this as a plain number (0-100).
  disk_percent_full: "Boot Drive Percentage Full"

  # --- Hardware info (optional) ---

  # Processor architecture. Typical values: "Apple M3 Pro", "Intel Core i9".
  architecture: "Architecture"

  # The human-readable model name (e.g., "MacBook Pro (16-inch, 2021)").
  model: "Model"

  # --- Enrollment / MDM (optional) ---

  # Date the computer was last enrolled in Jamf.
  last_enrollment: "Last Enrollment"

  # MDM configuration profile expiration date.
  # Used with custom_eas type: date to flag expiring/expired profiles.
  mdm_expiry: "MDM Profile Expiration Date"


# =============================================================================
# MOBILE CSV COLUMN MAPPING
# =============================================================================
# Used when you want workbook CSV sheets from a mobile-device export instead of
# a computer export. This is separate from `columns` because one config can keep
# both families defined in `report_families` without forcing one header mapping
# to fit both schemas.
#
# The first mobile CSV release writes dedicated Mobile Device Inventory and
# Mobile Stale Devices sheets plus custom_eas sheets. Trend charts still remain
# jamf-cli-driven or computer-CSV-driven.

mobile_columns:

  # --- Core identity fields (required for mobile CSV sheets) ---

  # Device display name in the mobile-device export.
  device_name: "Display Name"

  # Hardware serial number.
  serial_number: "Serial Number"

  # iOS / iPadOS / tvOS version string.
  operating_system: "OS Version"

  # Last inventory update / check-in timestamp.
  last_checkin: "Last Inventory Update"

  # --- Useful optional fields ---

  email: "Email Address"
  model: "Model"
  device_family: "Device Family"
  managed: "Managed"
  supervised: "Supervised"


# =============================================================================
# SECURITY AGENTS
# =============================================================================
# Defines which third-party security tools to track.
# Each entry drives a row in the Security Agents sheet.
#
# Required fields per entry:
#   name            - Display label in the report
#   column          - Exact EA column name in your CSV
#   connected_value - The string that means "installed / running"
#                     (case-insensitive substring match)
#
# Comment out any agents your org does not deploy.

security_agents:
  - name: "CrowdStrike Falcon"
    column: "CrowdStrike Falcon - Status"
    # Common EA values: "Installed", "Running", "Healthy", "1"
    connected_value: "Installed"

  - name: "SentinelOne"
    column: "SentinelOne - Agent Status"
    # Common EA values: "running", "Installed", "Active"
    connected_value: "running"

  - name: "Jamf Protect"
    column: "Jamf Protect - Status"
    # Common EA values: "Healthy", "Installed", "Running"
    connected_value: "Healthy"

  - name: "Splunk UF"
    column: "Splunk Universal Forwarder - Status"
    # Common EA values: "Running", "Installed", "Active"
    connected_value: "Running"

  - name: "Nessus Agent"
    column: "Nessus Agent - Status"
    # Common EA values: "running", "Linked", "Installed"
    connected_value: "running"

  - name: "Tanium Client"
    column: "Tanium Client - Version"
    # For Tanium, any non-empty version string means installed.
    # Match the version prefix your org deploys.
    connected_value: "7."

  - name: "Carbon Black"
    column: "Carbon Black Cloud - Sensor Status"
    # Common EA values: "ACTIVE", "Installed", "Running"
    connected_value: "ACTIVE"


# =============================================================================
# JAMF-CLI SNAPSHOTS
# =============================================================================
# jamf-cli is optional. When available, the script can fetch live data and save
# JSON snapshots here. When live auth is unavailable, the script can also reuse
# the newest saved snapshot for each supported sheet.
#
# This lets you keep the simple community default ("jamf-cli-data" next to the
# script) or point at an existing cache such as "Jamf Reports/jamf-cli-data".
# Relative paths here resolve from the folder containing config.yaml.

jamf_cli:
  # Master switch for jamf-cli integration. Set false for a strict CSV-only
  # run that ignores both live jamf-cli commands and cached jamf-cli JSON.
  enabled: true
  # Directory where jamf-cli JSON snapshots are stored.
  data_dir: "jamf-cli-data"
  # Optional jamf-cli profile name, equivalent to passing -p/--profile to
  # jamf-cli. When you use multiple profiles, point data_dir at a profile-
  # specific folder so cached snapshots do not mix between tenants.
  profile: ""
  # Reuse the latest saved JSON snapshot when a live jamf-cli command fails.
  # This helps generate/check keep working from cached report data, but
  # inventory-csv still requires live jamf-cli auth.
  use_cached_data: true
  # Fetch Fleet Overview live by default. Set false if you want overview to use
  # cached JSON only for a specific tenant or troubleshooting scenario.
  allow_live_overview: true
  # Sheets to skip entirely during generate. Useful for omitting API-expensive
  # sheets on servers with limited resources. The sheet name must match exactly
  # (case-insensitive). Example — omit the two managed software update sheets:
  #
  #   disabled_sheets:
  #     - "Update Status"
  #     - "Update Failures"
  #
  # Valid sheet names: Fleet Overview, Mobile Fleet Summary, Inventory Summary,
  # Hardware Models, Mobile Inventory, Security Posture, Device Compliance,
  # Check-in Health, EA Coverage, Environment Stats, EA Definitions,
  # Software Installs, Policy Health, Profile Status, Mobile Config Profiles,
  # App Status, Active Devices, Patch Compliance, Patch Failures,
  # Update Status, Update Failures, Smart Groups, Package Lifecycle
  disabled_sheets: []


# ---------------------------------------------------------------------------
# Organisational branding (all fields optional)
# ---------------------------------------------------------------------------
branding:
  # Your organisation's name. When set, it is prepended to every sheet title
  # in the Excel workbook (e.g. "Acme Corp — Fleet Overview") and shown in
  # the HTML report header and PPTX title slide.
  org_name: ""

  # Path to a PNG or JPEG logo file (relative to this config file, or absolute).
  # The logo is embedded as a base64 image in the self-contained HTML report,
  # and inserted on the Report Sources sheet of the Excel workbook.
  logo_path: ""

  # Hex colour used for Excel column headers and the HTML report's primary
  # accent colour (topbar, links, stat-card values).  Default: #2D5EA2
  accent_color: "#2D5EA2"

  # Darker variant of accent_color — used for the HTML topbar background and
  # dark-mode accent elements.  Default: #004165
  accent_dark:  "#004165"


# =============================================================================
# HTML REPORT HISTORY
# =============================================================================
# When track_history is true, every `html` run appends an OS-version snapshot
# to the history file.  Once two or more snapshots exist for an instance URL, a
# macOS Adoption Timeline chart appears in the HTML report.
#
# history_file: path to the JSON file that persists snapshots across runs.
#   Relative paths resolve from this config file's directory.
#   Default (when blank): ~/.jamf-report-history.json
#
html:
  track_history: false
  history_file: ""


# =============================================================================
# JAMF PROTECT
# =============================================================================
# Experimental Jamf Protect workbook support. This is opt-in because the
# community project has not been fully validated against a live Protect tenant.
# The report currently builds a single "Protect Overview" sheet from:
#   - jamf-cli protect overview
#   - jamf-cli protect computers list
#   - jamf-cli protect analytics list
#   - jamf-cli protect plans list
#
# jamf-cli uses the same profile flag (`-p/--profile`) for both Pro and Protect,
# but Protect still requires its own setup/auth flow:
#
#   jamf-cli protect setup

protect:
  # Set true to enable the experimental Protect Overview sheet and snapshot
  # collection for Jamf Protect commands.
  enabled: false


# =============================================================================
# JAMF PLATFORM API
# =============================================================================
# Preview workbook support for jamf-cli builds that expose Platform API report
# commands under `jamf-cli pro report`, including:
#   - blueprint-status
#   - compliance-rules
#   - compliance-devices
#   - ddm-status
#
# This path is opt-in because the upstream jamf-cli Platform API support is
# still emerging. It uses the same selected jamf-cli profile, but that profile
# must also have working Platform gateway auth in the jamf-cli build you use.
#
# List each benchmark title in compliance_benchmarks. Each entry generates two
# sheets: one for per-rule pass/fail stats and one for per-device results.
# Orgs commonly run multiple benchmarks (e.g. an enforced baseline and an audit
# baseline, or separate baselines per department). Leave the list empty to skip
# compliance sheets while still including the Blueprint and DDM Status sheets.
#
# Sheet names are derived from the benchmark title (truncated to fit Excel's
# 31-character limit), e.g. "NIST 800-53r5 Moderate Rules" and
# "NIST 800-53r5 Moderate Devices".

platform:
  # Set true to enable the preview Platform API sheets.
  enabled: false
  # List of benchmark titles for the Platform compliance sheets.
  # Each entry produces a Rules sheet and a Devices sheet.
  compliance_benchmarks:
    # - "NIST 800-53r5 Moderate"
    # - "DISA STIG"


# =============================================================================
# COMPLIANCE
# =============================================================================
# Tracks mSCP (macOS Security Compliance Project) audit results or any other
# compliance framework your org reports on.
#
# The mSCP EA scripts write a failed-rules count and a pipe-delimited list of
# failed rule IDs to two separate EAs. Configure both below.
#
# Set enabled: false to skip the Compliance sheet entirely.

compliance:
  enabled: true
  baseline_label: "mSCP Compliance"
  # EA column containing the integer count of failed rules.
  failures_count_column: "Compliance - Failed mSCP Results Count - NIST 800-53r5"
  # EA column containing the pipe-delimited list of failed rule IDs.
  # Example cell value: "os_filevault_enable|os_screensaver_timeout|..."
  failures_list_column: "Compliance - Failed mSCP Result List - NIST 800-53r5"


# =============================================================================
# CUSTOM EA SHEETS
# =============================================================================
# Define extra spreadsheet tabs driven entirely by EA data from your CSV.
# Each list entry creates one sheet in the output workbook.
#
# Required fields for every entry:
#   name    - Sheet tab label and section heading in the report
#   column  - Exact EA column name in your CSV
#   type    - One of: boolean, percentage, version, text, date
#
# Supported EA types:
#
#   boolean     - Values like Yes/No, True/False, Enabled/Disabled.
#                 Generates a summary table. Set true_value to the string
#                 that means "compliant".
#
#   percentage  - Numeric values 0-100. Flags devices above warning_threshold
#                 and critical_threshold. Generates a distribution table.
#
#   version     - Version strings (e.g., "15.3.2", "10.0.1").
#                 Generates a version frequency table. Set current_versions
#                 to a list of known-current versions for status coloring.
#
#   text        - Free-form strings. Generates a frequency table.
#                 Useful for agent status values, account names, etc.
#
#   date        - Date strings. Flags devices where the date is past (expired)
#                 or within warning_days days (expiring soon).
#                 Useful for certificate expiration, profile expiration.

custom_eas:

  # --- FileVault encryption status ---
  - name: "FileVault Status"
    column: "FileVault 2 - Status"
    type: boolean
    # Value in this EA that means "compliant / enabled"
    true_value: "Encrypted"

  # --- Disk usage (% used) ---
  - name: "Disk Usage"
    column: "Boot Drive Percentage Full"
    type: percentage
    # Devices above warning_threshold are flagged yellow; above critical_threshold, red.
    warning_threshold: 80
    critical_threshold: 90

  # --- macOS version compliance ---
  - name: "macOS Version"
    column: "Operating System Version"
    type: version
    # List the version strings considered current in your org.
    # Devices on any other version are flagged in the output.
    current_versions:
      - "15.4"
      - "15.3.2"

  # --- Secure Token status ---
  - name: "Secure Token"
    column: "Secure Token - Status"
    type: boolean
    true_value: "Enabled"

  # --- MDM configuration profile expiration ---
  - name: "MDM Profile Expiration"
    column: "MDM Profile Expiration Date"
    type: date
    # Devices with an expiration date within this many days are flagged "expiring soon".
    # Falls back to thresholds.cert_warning_days if not set here.
    warning_days: 30

  # --- Identity certificate expiration ---
  - name: "Identity Certificate Expiration"
    column: "Identity Certificate - Expiration Date"
    type: date
    warning_days: 60

  # --- Patch management agent status ---
  - name: "Patch Agent Status"
    column: "Patch Management - Agent Status"
    type: text


# =============================================================================
# REPORT FAMILIES
# =============================================================================
# Optional manifest for tenants that keep many emailed/exported Jamf CSVs.
# Use this when you want one workspace to preserve multiple raw report streams
# while still making it explicit which family drives the main workbook.
#
# Current behavior:
# - report_families.computers drives generate/check when --csv is omitted
# - if no computers family matches, report_families.mobile is the fallback
# - collect archives the newest matching CSV for every enabled family into that
#   family's historical_dir
# - mobile can drive dedicated mobile CSV workbook sheets when mobile_columns is
#   configured
# - compliance remains an archival/discovery path today

report_families:

  computers:
    enabled: false
    # Folder where the current/raw computer-family exports land.
    current_dir: "Jamf Reports/Pro"
    # Historical store just for this family.
    historical_dir: "snapshots/computers"
    # Optional glob filters. Match on filename and path relative to current_dir.
    include_globs:
      - "*Computers*.csv"
    exclude_globs:
      - "*Portal - Applications*.csv"
      - "*Out of date OS*.csv"
    # Optional filename fragments used to prefer a baseline inventory export
    # when multiple candidates match the include globs.
    prefer_name_contains:
      - "All Devices"
      - "Checked in"

  mobile:
    enabled: false
    current_dir: "Jamf Reports/Pro"
    historical_dir: "snapshots/mobile"
    include_globs:
      - "*Mobile Devices*.csv"
    exclude_globs: []
    prefer_name_contains:
      - "All Devices"

  compliance:
    enabled: false
    current_dir: "Jamf Reports/Compliance"
    historical_dir: "snapshots/compliance"
    include_globs:
      - "*Compliance*.csv"
    exclude_globs: []
    prefer_name_contains: []


# =============================================================================
# THRESHOLDS
# =============================================================================
# Global numeric thresholds used as defaults across multiple sheets.
# Per-EA thresholds (like warning_threshold in custom_eas above) override
# these defaults when both are set.

thresholds:

  # Devices not checked in within this many days are treated as inactive
  # and excluded from compliance/security agent counts.
  stale_device_days: 30

  # Devices not checked in within this many days are flagged overdue on the
  # Check-in Health sheet. Separate from stale_device_days — this is a shorter
  # operational threshold (default 7 days) vs the longer stale window.
  checkin_overdue_days: 7

  # Default disk usage thresholds used when not set per-EA.
  warning_disk_percent: 80
  critical_disk_percent: 90

  # Default certificate/date expiry warning window (days).
  cert_warning_days: 90

  # Error count thresholds for jamf-cli Profile Status and App Status sheets.
  # Rows with error counts at or above profile_error_critical are highlighted red;
  # at or above profile_error_warning, yellow.
  profile_error_critical: 50
  profile_error_warning: 10


# =============================================================================
# OUTPUT
# =============================================================================

output:

  # Directory where report files are written. Relative paths resolve from the
  # folder containing config.yaml. Created automatically if it does not exist.
  output_dir: "Generated Reports"

  # Append a local date/time stamp to generated filenames unless they already
  # contain one.
  timestamp_outputs: true

  # Automatically move older generated runs out of the main output folder.
  archive_enabled: true

  # Optional archive directory for older generated reports and inventory CSVs.
  # Leave blank to use an "archive" folder next to the active output file.
  archive_dir: ""

  # Number of recent timestamped runs to keep in the main output folder for
  # each report family before older runs are moved into archive_dir.
  keep_latest_runs: 10

  # Generate a PowerPoint (.pptx) executive-summary deck alongside the xlsx.
  # Requires python-pptx: pip install python-pptx
  # The deck contains a title slide, a report-summary slide, and a list of
  # all sheets written.  It is intended as a starting point for presentations,
  # not as a complete replacement for the xlsx.
  export_pptx: false


# =============================================================================
# CHARTS
# =============================================================================
# Controls matplotlib PNG chart generation and embedding in the xlsx workbook.
# Requires: pip install matplotlib
#
# Charts are embedded in a "Charts" sheet in the workbook AND saved as
# standalone PNG files alongside the xlsx. PNG filenames use the workbook stem
# as a prefix, so each run stays grouped together.
#
# Trend charts read dated CSV snapshots from historical_csv_dir or --historical-csv-dir.
# Snapshot filenames should contain YYYY-MM-DD, YYYYMMDD, YYYY-MM-DD_HHMMSS,
# or YYYY-MM-DDTHHMMSS somewhere in the filename.

charts:

  # Set to false to disable all chart generation.
  enabled: true

  # Save charts as PNG files alongside the xlsx report.
  save_png: true

  # Embed all generated charts into a "Charts" sheet in the workbook.
  embed_in_xlsx: true

  # Optional directory of dated CSV snapshots used for trend charts.
  # Relative paths resolve from the folder containing config.yaml.
  # Best practice: keep one baseline computer inventory export (and optionally
  # one baseline mobile inventory export) per cadence. If a single folder mixes
  # equivalent exports like "Portal - Applications" and "Insights - All Devices",
  # trend charts keep the largest same-day snapshot for that schema and ignore
  # smaller duplicate candidates.
  historical_csv_dir: "snapshots"

  # When true, generate automatically copies the current --csv into
  # historical_csv_dir using a date/time-stamped filename.
  # Re-running generate with the same unchanged CSV reuses the existing
  # identical snapshot instead of copying another duplicate.
  archive_current_csv: true

  # macOS adoption charts: device counts per OS version over time.
  # Uses CSV snapshots when available and falls back to jamf-cli
  # inventory-summary snapshot history for jamf-cli-only workflows.
  os_adoption:
    enabled: true
    # Also generate one chart per major macOS version (drilldown to minor/patch).
    per_major_charts: true

  # Compliance trend: stacked area chart bucketing devices by failure count.
  # Requires compliance.failures_count_column to be configured.
  compliance_trend:
    enabled: true
    # Failure count bands — labels, thresholds, and colors.
    bands:
      - {label: "Pass",            min_failures: 0,  max_failures: 0,    color: "#4472C4"}
      - {label: "Low (1-10)",      min_failures: 1,  max_failures: 10,   color: "#2E9E7D"}
      - {label: "Med-Low (11-30)", min_failures: 11, max_failures: 30,   color: "#FFCA30"}
      - {label: "Medium (31-50)",  min_failures: 31, max_failures: 50,   color: "#F07C21"}
      - {label: "High (>50)",      min_failures: 51, max_failures: 9999, color: "#C0392B"}

  # jamf-cli-only trend: managed/unmanaged and current/stale device counts
  # over time from cached device-compliance snapshots.
  device_state_trend:
    enabled: true


# =============================================================================
# JAMF SCHOOL (optional — requires jamf-cli school setup)
# =============================================================================
# Configure this section to generate Jamf School reports.
#
# Setup:
#   1. Run: jamf-cli school setup --profile-name school
#   2. Set school_cli.enabled: true below
#   3. Map school_columns to your Jamf School CSV headers:
#        python3 jamf-reports-community.py school-scaffold --csv school_export.csv
#   4. Generate a report:
#        python3 jamf-reports-community.py school-generate --config config.yaml
#      Or with a CSV export instead of live jamf-cli data:
#        python3 jamf-reports-community.py school-generate --csv school_export.csv

school_cli:
  # Set true to use live jamf-cli school commands.
  # When false, school-generate still works with --csv.
  enabled: false
  # Directory where jamf-cli school JSON snapshots are stored.
  data_dir: "school-cli-data"
  # Profile name configured via: jamf-cli school setup --profile-name <name>
  profile: "school"
  # Fall back to cached snapshots when live commands fail.
  use_cached_data: true


# ---------------------------------------------------------------------------
# Jamf School column mapping
# ---------------------------------------------------------------------------
# Maps logical field names to the actual column headers in your Jamf School
# CSV device export (the semicolon-delimited file from Device > Export).
#
# Run auto-scaffold to generate these mappings:
#   python3 jamf-reports-community.py school-scaffold --csv school_export.csv
#
# Validate at any time:
#   python3 jamf-reports-community.py school-check --csv school_export.csv

school_columns:
  # Device display name (e.g. "Jamf School exports this as 'Name'")
  device_name: ""
  serial_number: ""
  os_version: ""
  model: ""
  # School/location name the device belongs to
  location_name: ""
  owner_email: ""
  owner_first_name: ""
  owner_last_name: ""
  owner_username: ""
  # Boolean columns — expected values: "true" / "false"
  managed: ""
  supervised: ""
  shared: ""
  lost_mode: ""
  # Timestamps — ISO 8601 format expected
  last_checkin: ""
  enrollment_date: ""
  # Enrollment method (dep, user, manual, etc.)
  enroll_type: ""
  # Pipe- or bracket-delimited list of device group memberships
  member_of: ""
  # Available storage capacity (float, GB)
  available_capacity: ""


# =============================================================================
# FILTERED CSV EXPORT REPORTS
# =============================================================================
# Generates dated CSV snapshots from the wide automation_inventory_*.csv
# produced by launchagent-run --mode jamf-cli-full.  Each entry runs on its
# own schedule and writes to a designated folder, replicating the outputs that
# Jamf Pro's built-in Advanced Computer Search reports used to produce.
#
# These run automatically as the last step of launchagent-run --mode jamf-cli-full,
# or manually via:
#
#   python3 jamf-reports-community.py export-reports [--csv inventory.csv]
#
# To force all reports regardless of schedule, delete:
#   jamf-cli-data/state/export-<name>.last
#
# --- Schedule values ---
#   daily           Run every time the tool fires (each weekday if using the default LaunchAgent)
#   1st-of-month    Run only on the 1st of the month
#   mon,wed,fri     Run on specific weekday(s); comma-separate multiple days
#
# --- Filter options (optional) ---
#   within_days: N      Include only rows where <field> date is within N days of today
#   exclude_values: []  Exclude rows where <field> value is in the provided list
#
# --- Column mapping ---
#   columns:
#     "Output Column Name": "Source Column Name in inventory CSV"
#
# Leave export_reports as an empty list [] to disable all filtered exports.

export_reports:

  # macOS version report — all managed devices, every weekday
  - name: "macos_updates"
    output_dir: "macOS_Updates"
    filename: "{ts} - Report - macOS Operating System Report.csv"
    schedule: daily
    columns:
      Computer Name: "Computer Name"
      Model: "Model"
      Serial Number: "Serial Number"
      "Operating System Version": "Operating System"
      "Email Address": "Email Address"
      "Full Name": "Real Name"
      "Last Inventory Update": "Last Report"

  # All managed devices — minimal columns, every Monday
  - name: "all_managed_macs"
    output_dir: "All Managed Macs Report"
    filename: "{ts} - Report - All Managed Macs.csv"
    schedule: mon
    columns:
      Computer Name: "Computer Name"
      "Email Address": "Email Address"
      "Full Name": "Real Name"

  # Active devices (checked in within 30 days) — 1st of each month
  - name: "active_device_list"
    output_dir: "Active Device List"
    filename: "{ts} - Report - Devices Checked In (Last 30 Days).csv"
    schedule: 1st-of-month
    filter:
      field: "Last Check-in"
      within_days: 30
    columns:
      Computer Name: "Computer Name"
      Model: "Model"
      Serial Number: "Serial Number"
      "Full Name": "Real Name"
      "Operating System Version": "Operating System"
      "Last Inventory Update": "Last Report"
      "Last Check-in": "Last Check-in"

  # New enrollments in the past 7 days — every Friday
  - name: "new_system_builds"
    output_dir: "New System Build Report"
    filename: "{ts} - Report - New System Builds for Past Week.csv"
    schedule: fri
    filter:
      field: "Last Enrollment"
      within_days: 7
    columns:
      Computer Name: "Computer Name"
      "Full Name": "Real Name"
      "Last Enrollment": "Last Enrollment"
      Username: "Username"
      "Email Address": "Email Address"
      "Operating System": "Operating System"
      Position: "Position"
